name: Firmware build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake ninja-build gcc-arm-none-eabi
      - name: Fetch pinned Pico SDK and TinyUSB
        env:
          PICO_SDK_COMMIT: a1438dff1d38bd9c65dbd693f0e5db4b9ae91779
        run: |
          git init "$RUNNER_TEMP/pico-sdk"
          git -C "$RUNNER_TEMP/pico-sdk" remote add origin https://github.com/raspberrypi/pico-sdk.git
          git -C "$RUNNER_TEMP/pico-sdk" fetch --depth 1 origin "$PICO_SDK_COMMIT"
          git -C "$RUNNER_TEMP/pico-sdk" checkout --detach FETCH_HEAD
          git -C "$RUNNER_TEMP/pico-sdk" submodule update --init --depth 1 lib/tinyusb
      - name: Build 250 MHz performance firmware
        run: |
          cmake -S firmware -B build/firmware -G Ninja \
            -DPICO_SDK_PATH="$RUNNER_TEMP/pico-sdk" \
            -DPICO_BOARD=waveshare_rp2350_touch_amoled_2.41 \
            -DRPD_SYS_CLOCK_KHZ=250000 \
            -DRPD_PSRAM_MAX_SCK_HZ=133000000 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/firmware --parallel
      - name: Upload UF2
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rp2350-remote-display-uf2
          path: build/firmware/rp2350_remote_display.uf2
          if-no-files-found: error
